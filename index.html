<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Projeto WebAR</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

  <a-marker preset="hiro">

    <a-entity
      id="objeto3D"
      gltf-model="url(./assets/modelo.glb)"
      position="0 0 0"
      rotation="0 0 0"
      scale="0.05 0.05 0.05"

      animation__pulso="property: scale; startEvents: click; from: 0.05 0.05 0.05; to: 0.08 0.08 0.08; dur: 300; dir: alternate; loop: 2"

      onmousedown="this.setAttribute('scale','0.08 0.08 0.08')"
      onmouseup="this.setAttribute('scale','0.05 0.05 0.05')">
    </a-entity>

  </a-marker>

  <a-entity camera></a-entity>

</a-scene>

</body>
</html>
